name: Release & Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=wordguard

  build-release:
    runs-on: ubuntu-latest
    needs: deploy-web
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew 2>/dev/null || true
          gradle assembleRelease 2>/dev/null || gradle assembleDebug
      - name: Get version
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Prepare APK
        run: |
          find android -name "*.apk" -exec cp {} WordGuard-${{ steps.ver.outputs.v }}.apk \; 2>/dev/null || true
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: WordGuard-*.apk
          body: |
            ## WordGuard ${{ github.ref_name }}

            ### APK 다운로드
            Android 기기에서 APK를 다운로드하여 설치하세요.

            ### 웹 버전
            https://wordguard.pages.dev

            ### iOS (PWA)
            Safari에서 위 URL 접속 → "홈 화면에 추가"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
