<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A5B4FC"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Shield body -->
  <path d="M256 80 L380 140 L380 280 Q380 380 256 440 Q132 380 132 280 L132 140 Z" fill="url(#shield)" stroke="#312E81" stroke-width="8"/>
  <!-- Shield inner border -->
  <path d="M256 110 L360 160 L360 275 Q360 360 256 415 Q152 360 152 275 L152 160 Z" fill="none" stroke="#E0E7FF" stroke-width="3" opacity="0.6"/>
  <!-- Letter W -->
  <text x="256" y="310" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="180" fill="#FFFFFF" stroke="#312E81" stroke-width="4">W</text>
  <!-- Castle turrets on top -->
  <rect x="190" y="72" width="20" height="30" rx="3" fill="#C7D2FE"/>
  <rect x="246" y="58" width="20" height="35" rx="3" fill="#C7D2FE"/>
  <rect x="302" y="72" width="20" height="30" rx="3" fill="#C7D2FE"/>
  <!-- Sparkle effects -->
  <circle cx="160" cy="180" r="6" fill="#FBBF24" opacity="0.9"/>
  <circle cx="352" cy="180" r="6" fill="#FBBF24" opacity="0.9"/>
  <circle cx="256" cy="100" r="5" fill="#FBBF24" opacity="0.7"/>
</svg>
